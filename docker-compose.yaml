services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./config.yaml:/app/config.yaml
      - go-cache:/root/.cache/go-build
      - go-mod:/root/go/pkg/mod
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=debug
    command: air

volumes:
  go-cache:
  go-mod:
