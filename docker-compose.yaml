services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./config.yaml:/app/config.yaml
      - go-cache:/root/.cache/go-build
      - go-mod:/root/go/pkg/mod
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=debug
    command: air
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  go-cache:
  go-mod:
