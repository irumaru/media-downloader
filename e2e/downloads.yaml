desc: ダウンロードの作成と一覧取得
vars:
  secret: "list_secret_b"
runners:
  req:
    endpoint: http://localhost:8080
steps:
  get_channel:
    desc: チャンネル情報を取得できる
    req:
      /api/{{ vars.secret }}:
        get:
          body: null
    test: |
      current.res.status == 200
      && current.res.body.name != ""

  create_download:
    desc: ダウンロードを作成できる
    req:
      /api/{{ vars.secret }}/downloads:
        post:
          body:
            application/json:
              url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
    test: |
      current.res.status == 202
      && current.res.body.status == "pending"
      && current.res.body.id != ""

  check_list:
    desc: ダウンロード一覧に作成したタスクが含まれる
    req:
      /api/{{ vars.secret }}/downloads:
        get:
          body: null
    test: |
      current.res.status == 200
      && len(current.res.body.downloads) > 0
      && current.res.body.downloads[0].id == steps.create_download.res.body.id

  wait_for_completion:
    desc: ダウンロードが完了するまで待機する
    loop:
      count: 30
      interval: 1s
      until: |
        current.res.status == 200
        && current.res.body.id == steps.create_download.res.body.id
        && current.res.body.status == "completed"
    req:
      /api/{{ vars.secret }}/downloads/{{ steps.create_download.res.body.id }}:
        get:
          body: null
