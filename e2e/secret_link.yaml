desc: シークレットリンクの検証
runners:
  req:
    endpoint: http://localhost:8080
steps:
  - desc: 存在しないシークレットリンクで404を返す
    req:
      /api/invalid-secret-that-does-not-exist/downloads:
        get:
          body: null
    test: |
      current.res.status == 404

  - desc: 存在しないシークレットリンクへのPOSTも404を返す
    req:
      /api/invalid-secret-that-does-not-exist/downloads:
        post:
          body:
            application/json:
              url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
    test: |
      current.res.status == 404

  - desc: 無効なURLで400を返す
    req:
      /api/abc123def456/downloads:
        post:
          body:
            application/json:
              url: "https://example.com/not-youtube"
    test: |
      current.res.status == 400
