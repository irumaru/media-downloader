name: test-go

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'docker-compose.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Run Tests
        run: mise run test:unit
